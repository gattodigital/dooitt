<div class="auth-page">

  <div class="auth-card glass-card">

    <div class="auth-header">
      <div class="auth-icon">🔑</div>
      <h2>Welcome back</h2>
      <p>Sign in to your Dooitt account</p>
    </div>

    <form class="auth-form" (ngSubmit)="Post()" #signInForm="ngForm" novalidate>

      <div *ngIf="errorMessage" class="alert-error" role="alert">
        {{ errorMessage }}
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input
          id="email"
          class="form-input"
          [(ngModel)]="signInData.email"
          type="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
          required
          [disabled]="isLoading">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          id="password"
          class="form-input"
          [(ngModel)]="signInData.password"
          type="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
          [disabled]="isLoading">
      </div>

      <button class="btn-submit" type="submit" [disabled]="isLoading">
        <span *ngIf="!isLoading">Sign In <span class="btn-arrow">→</span></span>
        <span *ngIf="isLoading">Signing in…</span>
      </button>

    </form>

    <p class="auth-footer-text">
      Don't have an account?
      <a routerLink="/sign-up" class="auth-link">Create one →</a>
    </p>

  </div>

</div>
