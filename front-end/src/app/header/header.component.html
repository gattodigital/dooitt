<header class="site-header">
  <div class="header-inner">

    <a routerLink="/" class="brand">
      <span class="brand-icon">✦</span>
      <span class="brand-name">Dooitt</span>
    </a>

    <nav class="header-nav">
      <a
        *ngIf="apiService.authenticatedUser"
        routerLink="/main"
        class="nav-link"
        routerLinkActive="active">
        Dashboard
      </a>

      <button
        *ngIf="apiService.authenticatedUser"
        class="btn-logout"
        (click)="apiService.logOut()"
        routerLink="/">
        Log Out
      </button>

      <a
        *ngIf="!apiService.authenticatedUser"
        routerLink="/sign-in"
        class="nav-link">
        Sign In
      </a>

      <a
        *ngIf="!apiService.authenticatedUser"
        routerLink="/sign-up"
        class="btn-cta">
        Get Started
      </a>
    </nav>

  </div>
</header>
