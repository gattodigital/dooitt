<form class="task-form">

  <div class="form-group">
    <label class="form-label">Task Type</label>
    <select
      class="form-select"
      id="taskType"
      name="taskType"
      [(ngModel)]="taskData.taskType">
      <option value="" disabled selected>Select type...</option>
      <option
        *ngFor="let taskType of taskTypes"
        [value]="taskType.value">
        {{ taskType.viewValue }}
      </option>
    </select>
  </div>

  <div class="form-group">
    <label class="form-label">Priority</label>
    <select
      class="form-select"
      id="taskPriority"
      name="taskPriority"
      [(ngModel)]="taskData.taskPriority">
      <option value="" disabled selected>Select priority...</option>
      <option
        *ngFor="let taskPriority of taskPriorities"
        [value]="taskPriority.value">
        {{ taskPriority.viewValue }}
      </option>
    </select>
  </div>

  <div class="form-group">
    <label class="form-label">Due Date</label>
    <input
      class="form-input"
      id="taskDueDate"
      name="taskDueDate"
      [(ngModel)]="taskData.taskDueDate"
      type="date">
  </div>

  <div class="form-group">
    <label class="form-label">Description</label>
    <textarea
      class="form-textarea"
      id="taskDescription"
      name="taskDescription"
      [(ngModel)]="taskData.taskDescription"
      rows="3"
      placeholder="What needs to be done?">
    </textarea>
  </div>

  <button class="btn-add-task" type="button" (click)="Task()">
    <span>+ Add Task</span>
  </button>

</form>
