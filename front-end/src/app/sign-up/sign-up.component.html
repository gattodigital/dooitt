<div class="auth-page">

  <div class="auth-card glass-card">

    <div class="auth-header">
      <div class="auth-icon">🚀</div>
      <h2>Create account</h2>
      <p>Start managing tasks in seconds</p>
    </div>

    <form class="auth-form">

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input
            class="form-input"
            [(ngModel)]="signUpData.firstName"
            type="text"
            name="firstName"
            placeholder="Jane"
            autocomplete="given-name">
        </div>

        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input
            class="form-input"
            [(ngModel)]="signUpData.lastName"
            type="text"
            name="lastName"
            placeholder="Doe"
            autocomplete="family-name">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input
          class="form-input"
          [(ngModel)]="signUpData.email"
          type="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email">
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input
          class="form-input"
          [(ngModel)]="signUpData.password"
          type="password"
          name="password"
          placeholder="Create a strong password (8+ chars)"
          autocomplete="new-password">
        <small class="form-hint">Must be 8+ characters with uppercase, lowercase, and number</small>
      </div>

      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input
          class="form-input"
          [(ngModel)]="confirmPassword"
          type="password"
          name="confirmPassword"
          placeholder="Re-enter your password"
          autocomplete="new-password">
      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <button class="btn-submit" type="button" (click)="Post()">
        Create Account
        <span class="btn-arrow">→</span>
      </button>

    </form>

    <p class="auth-footer-text">
      Already have an account?
      <a routerLink="/sign-in" class="auth-link">Sign in →</a>
    </p>

  </div>

</div>
