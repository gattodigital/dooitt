<div class="auth-page">

  <div class="auth-card glass-card">

    <div class="auth-header">
      <div class="auth-icon">🚀</div>
      <h2>Create account</h2>
      <p>Start managing tasks in seconds</p>
    </div>

    <form class="auth-form">

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input
            class="form-input"
            [(ngModel)]="signUpData.firstName"
            type="text"
            name="firstName"
            placeholder="Jane"
            autocomplete="given-name"
            [disabled]="isLoading">
        </div>

        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input
            class="form-input"
            [(ngModel)]="signUpData.lastName"
            type="text"
            name="lastName"
            placeholder="Doe"
            autocomplete="family-name"
            [disabled]="isLoading">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input
          class="form-input"
          [(ngModel)]="signUpData.email"
          type="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
          [disabled]="isLoading">
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input
          class="form-input"
          [(ngModel)]="signUpData.password"
          type="password"
          name="password"
          placeholder="Create a strong password"
          autocomplete="new-password"
          [disabled]="isLoading">
        <small class="form-hint">Min 8 chars with uppercase, lowercase, number & special character</small>
      </div>

      <button class="btn-submit" type="button" (click)="Post()" [disabled]="isLoading">
        <span *ngIf="!isLoading">Create Account</span>
        <span *ngIf="isLoading">Creating account...</span>
        <span class="btn-arrow" *ngIf="!isLoading">→</span>
      </button>

    </form>

    <p class="auth-footer-text">
      Already have an account?
      <a routerLink="/sign-in" class="auth-link">Sign in →</a>
    </p>

  </div>

</div>
