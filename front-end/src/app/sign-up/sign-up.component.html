<div class="auth-page">

  <div class="auth-card glass-card">

    <div class="auth-header">
      <div class="auth-icon">🚀</div>
      <h2>Create account</h2>
      <p>Start managing tasks in seconds</p>
    </div>

    <form class="auth-form" (ngSubmit)="Post()" #signUpForm="ngForm" novalidate>

      <div *ngIf="errorMessage" class="alert-error" role="alert">
        {{ errorMessage }}
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="firstName">First Name</label>
          <input
            id="firstName"
            class="form-input"
            [(ngModel)]="signUpData.firstName"
            type="text"
            name="firstName"
            placeholder="Jane"
            autocomplete="given-name"
            [disabled]="isLoading">
        </div>

        <div class="form-group">
          <label class="form-label" for="lastName">Last Name</label>
          <input
            id="lastName"
            class="form-input"
            [(ngModel)]="signUpData.lastName"
            type="text"
            name="lastName"
            placeholder="Doe"
            autocomplete="family-name"
            [disabled]="isLoading">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input
          id="email"
          class="form-input"
          [(ngModel)]="signUpData.email"
          type="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
          required
          [disabled]="isLoading">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          id="password"
          class="form-input"
          [(ngModel)]="signUpData.password"
          type="password"
          name="password"
          placeholder="Create a strong password"
          autocomplete="new-password"
          required
          [disabled]="isLoading">
        <small class="form-hint">Min 8 chars with uppercase, lowercase, number & special character</small>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm Password</label>
        <input
          id="confirmPassword"
          class="form-input"
          [(ngModel)]="confirmPassword"
          type="password"
          name="confirmPassword"
          placeholder="Re-enter your password"
          autocomplete="new-password"
          required
          [disabled]="isLoading">
      </div>

      <button class="btn-submit" type="submit" [disabled]="isLoading">
        <span *ngIf="!isLoading">Create Account <span class="btn-arrow">→</span></span>
        <span *ngIf="isLoading">Creating account…</span>
      </button>

    </form>

    <p class="auth-footer-text">
      Already have an account?
      <a routerLink="/sign-in" class="auth-link">Sign in →</a>
    </p>

  </div>

</div>
