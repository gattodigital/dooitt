name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master

# Required for GitHub Pages deployment via Actions
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment at a time. cancel-in-progress is
# intentionally false (per GitHub Pages best-practice) so an in-progress
# deployment is never killed mid-way, which could leave Pages in a broken
# state. Subsequent pushes queue and always deploy their own artifact.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── Build ────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node 20 LTS ships npm 10 which supports lockfileVersion 3
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front-end/package-lock.json

      - name: Install dependencies
        working-directory: front-end
        run: npm ci

      # Substitute the API URL placeholder if the secret is available.
      # Emits a warning (not a hard error) so the build still succeeds when
      # the secret has not been configured yet.
      - name: Set API URL
        working-directory: front-end
        env:
          API_URL: ${{ secrets.API_URL }}
        run: |
          if [ -n "$API_URL" ]; then
            sed -i "s|__API_URL__|$API_URL|g" src/environments/environment.prod.ts
          else
            echo "::warning::API_URL secret is not set. The app will use the placeholder URL. Add it in Settings → Secrets → Actions."
          fi

      # --configuration=production replaces the deprecated --prod flag
      - name: Build
        working-directory: front-end
        run: npx ng build --configuration=production

      # Needed for Angular SPA routing on GitHub Pages (handles 404 redirects)
      - name: Copy index.html to 404.html
        run: cp front-end/dist/dooitt/index.html front-end/dist/dooitt/404.html

      # Configure Pages and upload the built artifact (single artifact per run)
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: front-end/dist/dooitt

  # ── Deploy ───────────────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
