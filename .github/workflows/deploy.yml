name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '14'
          cache: 'npm'
          cache-dependency-path: front-end/package-lock.json

      - name: Install dependencies
        working-directory: front-end
        run: npm ci

      - name: Set API URL
        working-directory: front-end
        env:
          API_URL: ${{ secrets.API_URL }}
        run: |
          if [ -z "$API_URL" ]; then
            echo "::error::API_URL secret is not set. Add it in Settings → Secrets → Actions before deploying." >&2
            exit 1
          fi
          sed -i "s|__API_URL__|$API_URL|g" src/environments/environment.prod.ts

      - name: Build
        working-directory: front-end
        run: npx ng build --prod

      - name: Copy index.html to 404.html (SPA routing fix)
        run: cp front-end/dist/dooitt/index.html front-end/dist/dooitt/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: front-end/dist/dooitt
